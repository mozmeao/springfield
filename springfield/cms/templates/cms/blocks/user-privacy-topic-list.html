
<div class="main-content">
  <div class="sidebar">
    <ul>
      {% for topic in value.topics %}
        <li>
          <a href="#{{ topic.anchor_id }}">
            <span class="table-content-icon" aria-hidden="true">
              <include:icon icon_name="forward" />
            </span>
            {{ topic.short_title }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>

  <div class="mobile-menu">
    <ul>
      {% for topic in value.topics %}
        <li>
          <a href="#{{ topic.anchor_id }}">
            {{ topic.short_title }}
            <span class="table-content-icon" aria-hidden="true">
              <include:icon icon_name="down" />
            </span>
          </a>
        </li>
      {% endfor %}
    </ul>
  </div>

  <div class="content-container">
    {% for topic in value.topics %}
      {{ topic }}
    {% endfor %}
  </div>
</div>
