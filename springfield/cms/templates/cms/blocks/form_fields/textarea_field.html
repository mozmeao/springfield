<div class="fl-field-wrap">
  <label class="fl-label" for="{{ value.internal_identifier }}">
    {{ value.label }}{% if value.required %} <span aria-hidden="true">*</span>{% endif %}
  </label>
  <textarea class="fl-field" id="{{ value.internal_identifier }}" name="{{ value.internal_identifier }}" rows="{{ value.rows }}"{% if value.required %} required aria-required="true"{% endif %}></textarea>
</div>
