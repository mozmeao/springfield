<fieldset class="mzp-c-field">
  <legend class="mzp-c-field-label">{{ value.label }}</legend>
  {% for option in value.options %}
    <label class="mzp-c-field-control">
      <input type="checkbox" name="{{ value.settings.internal_identifier }}" value="{{ option.value }}">
      {{ option.label }}
    </label>
  {% endfor %}
</fieldset>
