<figure class="fl-quote">
  <blockquote class="fl-body">
    {{ value.quote|richtext }}
  </blockquote>
  {% if value.author %}
    <figcaption class="fl-quote-author fl-body fl-body-small">{{ value.author }}</figcaption>
  {% endif %}
</figure>
