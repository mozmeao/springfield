<include:icon-list>
  {% for item in value.list_items %}
    <li>
      <span class="fl-icon-wrap">
        <include:icon icon_name="{{ item.icon }}" hidden="true" />
      </span>
      {{ item.text|richtext|remove_p_tag }}
    </li>
  {% endfor %}
</include:icon-list>
