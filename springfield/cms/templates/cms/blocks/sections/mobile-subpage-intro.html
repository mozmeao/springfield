<div class="fl-section" data-block-position="{{ block_position }}">
  <div class="fl-section-container">
    <include:intro slim media_position="{{ value.media_position }}">
      <content:heading>
        <include:heading
          level="h2"
          heading_text="{{ value.heading_text }}"
          subheading_text="{{ value.subheading_text }}"
        />
      </content:heading>
      <content:media>
        {% include_block value.image %}
      </content:media>
    </include:intro>
  </div>
</div>
