<div class="fl-mediacontent{% if narrow %} is-narrow{% endif %} fl-mediacontent-feature">
  <div class="fl-mediacontent-media" aria-hidden="true">
    {{ contents.media }}
  </div>
  <div class="fl-mediacontent-content">
    <div class="fl-body">
      {{ contents.body }}
    </div>
  </div>
</div>
