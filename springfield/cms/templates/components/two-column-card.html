{# props tag="", stick_image_to_right=0 #}

<div class="fl-two-column-card {% if stick_image_to_right %}fl-two-column-card-image-right{% endif %}">
  {% if tag %}
    <span class="fl-card-tag">
      <include:tag
        corners="rounded"
        color="purple"
        text="{{ tag }}"
      />
    </span>
  {% endif %}
  <div class="fl-two-column-card-content">{{ contents }}</div>
</div>
