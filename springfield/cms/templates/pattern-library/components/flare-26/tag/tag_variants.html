<div class="pl-frame pl-frame--white">
  <h4>Tag variants</h4>
  <div style="display: grid; grid-auto-flow: column; grid-auto-columns: max-content; gap: 16px;">
    {% for tag in tags %}
      <div data-testid="{{ tag.testid }}" style="display: flex; flex-direction: column; gap: 8px; align-items: start;">
        <p style="margin: 0; font-weight: 600;">{{ tag.note }}</p>
        <include:tag
          text="{{ tag.text }}"
          color="{{ tag.color }}"
        />
      </div>
    {% endfor %}
  </div>
</div>
