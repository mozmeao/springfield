      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: linux
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-linux</b>
          will be displayed if wrapped in class <b>.linux</b>.</p>
    - name: "Platform: Android"
      platform_conditions:
        - android
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: android
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-android</b>
          will be displayed if wrapped in class <b>.android</b>.</p>
    - name: "Platform: iOS"
      platform_conditions:
        - ios
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: ios
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-ios</b>
          will be displayed if wrapped in class <b>.ios</b>.</p>
    - name: "Platform: Windows 10+"
      platform_conditions:
        - windows-10-plus
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: windows-10-plus
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-windows-10-plus</b>
          will be displayed if wrapped in class <b>.windows-10-plus</b>.</p>
    - name: "Platform: Other OS"
      platform_conditions:
        - other
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: other
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-other</b>
          will be displayed if wrapped in the HTML element with class <b>.other</b>.</p>
    - name: "Unsupported Platform"
      platform_conditions:
        - unsupported
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: fx-unsupported
      body_class:
      unconditional_contents: |
        <p>Content with class <b>.conditional-display.condition-unsupported</b>
          will be displayed if wrapped in class <b>.fx-unsupported</b>.</p>
        <p><b>Note:</b> The CSS rule uses the <code>html</code> tag, so this condition cannot be faked in the pattern library.</p>
    - name: "Platform: macOS or Linux (multiple)"
      platform_conditions:
        - osx
        - linux
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: osx linux
      body_class:
      contents: |
        <p>Content is shown when <em>any</em> of the selected platform classes are present.
          Content with class <b>.conditional-display.condition-osx.condition-linux</b>
          will be displayed if wrapped in class <b>.osx</b> or <b>.linux</b>.</p>
    - name: "Firefox: Firefox users only"
      platform_conditions: []
      firefox_condition: is-firefox
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: is-firefox
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-is-firefox</b>
          will be displayed if wrapped in class <b>.is-firefox</b>.</p>
    - name: "Firefox: Non-Firefox users only"
      platform_conditions: []
      firefox_condition: not-firefox
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: not-firefox
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-not-firefox</b>
          will be displayed if wrapped in class <b>.not-firefox</b>.</p>
    - name: "Auth: Signed-in users only"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: state-fxa-supported-signed-in
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class: state-fxa-supported-signed-in
      contents: |
        <p>Content with class <b>.conditional-display.condition-state-fxa-supported-signed-in</b>
          will be displayed if wrapped in class <b>.state-fxa-supported-signed-in</b>.</p>
    - name: "Auth: Signed-out users only"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: state-fxa-supported-signed-out
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class: state-fxa-supported-signed-out
      contents: |
        <p>Content with class <b>.conditional-display.condition-state-fxa-supported-signed-out</b>
          will be displayed if wrapped in class <b>.state-fxa-supported-signed-out</b>.</p>
    - name: "Default browser: Firefox is default"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: is-default
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class: is-default
      contents: |
        <p>Content with class <b>.conditional-display.condition-is-default</b>
          will be displayed if wrapped in class <b>.is-default</b>.</p>
    - name: "Default browser: Firefox is not default"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: is-not-default
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class: is-not-default
      contents: |
        <p>Content with class <b>.conditional-display.condition-is-not-default</b>
          will be displayed if wrapped in class <b>.is-not-default</b>.</p>
    - name: "Geo: US only"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions:
        - US
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class:
      contents: |
        <p>Content inside a <b>.conditional-display.condition-geo</b> div with
          <b>data-geo-conditions="US"</b> will be revealed by JS when the user's
          country code matches, adding class <b>.geo-match</b> to it.</p>
        <p><b>Note:</b> Since the pattern library's request is an iframe, passing the <code>?geo=COUNTRY_CODE</code>
          parameter in the URL doesn't work to fake the user's location. The <code>data-country-code="COUNTRY_CODE"</code>
          attribute in the <code>html</code> element will always be US.</p>
    - name: "Geo: US, UK or Canada"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions:
        - US
        - UK
        - CA
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class:
      contents: |
        <p>Content inside a <b>.conditional-display.condition-geo</b> div with
          <b>data-geo-conditions="US,UK,CA"</b> will be revealed by JS when the
          user's country code matches any entry, adding class <b>.geo-match</b> to it.</p>
        <p><b>Note:</b> Since the pattern library's request is an iframe, passing the <code>?geo=COUNTRY_CODE</code>
          parameter in the URL doesn't work to fake the user's location. The <code>data-country-code="COUNTRY_CODE"</code>
          attribute in the <code>html</code> element will always be US.</p>
    - name: "Version: Firefox >= 150 (minimum)"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: 150
      max_version: null
      ai_controls_condition: null
      html_class:
      body_class:
      contents: |
        <p>Content inside a <b>.conditional-display.condition-fx-version</b> div with
          <b>data-min-version="150"</b> will be revealed by JS for Firefox >= 150
          with the class <b>.version-match</b>.</p>
    - name: "Version: Firefox <= 149 (maximum)"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: 149
      ai_controls_condition: null
      html_class:
      body_class:
      contents: |
        <p>Content inside a <b>.conditional-display.condition-fx-version</b> div with
          <b>data-max-version="149"</b> will be revealed by JS for Firefox <= 149
          with the class <b>.version-match</b>.</p>
    - name: "Version: Firefox 148-150 (range)"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: 148
      max_version: 150
      ai_controls_condition: null
      html_class:
      body_class:
      contents: |
        <p>Content inside a <b>.conditional-display.condition-fx-version</b> div with
          <b>data-min-version="148" data-max-version="150"</b> will be revealed by JS
          for Firefox 148 through 150 with the class <b>.version-match</b>.</p>
    - name: "AI Controls: available"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: available
      html_class: ai-controls-available
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-ai-controls-available</b>
          will be displayed when JS adds class <b>.ai-controls-available</b> to
          <b>&lt;html&gt;</b> via <b>UITour.getConfiguration('aiControls')</b>.</p>
    - name: "AI Controls: unavailable"
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: unavailable
      html_class:
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-ai-controls-unavailable</b>
          will be displayed when JS adds class <b>.ai-controls-unavailable</b> to
          <b>&lt;html&gt;</b> via <b>UITour.getConfiguration('aiControls')</b>.</p>
    - name: "Combo: Windows + Firefox users"
      platform_conditions:
        - windows
      firefox_condition: is-firefox
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: windows is-firefox
      body_class:
      contents: |
        <p>All condition types can be combined. The content is wrapped in a <b>.conditional-display.condition-windows</b>
          and a <b>.conditional-display.condition-is-firefox</b> divs. It will be displayed only when both conditions are met.</p>
    - name: "Combo: Signed-out + US + Firefox 150+"
      platform_conditions: []
      firefox_condition: is-firefox
      auth_state_condition: state-fxa-supported-signed-out
      default_browser_condition: null
      geo_conditions:
        - US
      min_version: 150
      max_version: null
      ai_controls_condition: null
      html_class: is-firefox
      body_class: state-fxa-supported-signed-out
      contents: |
        <p>Multiple conditions combined: Firefox browser, signed-out, Canada geo, and
          Firefox version >= 150. All must be satisfied simultaneously.</p>
