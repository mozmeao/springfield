name: Conditional Display
context:
  variants:
    - name: All Users (no conditions)
      platform_conditions: []
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      contents: |
        <p>No condition classes are applied. Content is shown to all users.</p>
    - name: "Platform: Windows"
      platform_conditions:
        - windows
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: windows
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-windows</b>
          will be displayed if wrapped in class <b>.windows</b>.</p>
    - name: "Platform: macOS"
      platform_conditions:
        - osx
      firefox_condition: null
      auth_state_condition: null
      default_browser_condition: null
      geo_conditions: []
      min_version: null
      max_version: null
      ai_controls_condition: null
      html_class: osx
      body_class:
      contents: |
        <p>Content with class <b>.conditional-display.condition-osx</b>
          will be displayed if wrapped in class <b>.osx</b>.</p>
    - name: "Platform: Linux"
