name: "Intro variants"
context:
  variants:
    - title: Intro With Media
      testid: media-after
      media_position: "after"
      vertical: true
      heading:
        heading_text: Heading
        superheading_text: Superheading
        subheading_text: Subheading
        alignment_class: text-center
        subheading_size: 3
      tags:
        - text: Privacy
          color: purple
          corners: round
          before_icon: shield
          after_icon: ''
        - text: Security
          color: blue
          corners: round
          before_icon: ''
          after_icon: ''
      body: This is a sample body text for the intro with media variant. It provides additional context below the heading and tags.
      buttons:
