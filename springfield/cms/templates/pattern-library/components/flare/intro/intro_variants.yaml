          link: testurl
          external: true
          icon_name: forward
          icon_position: right
        - label: Sign Up
          link: testurl
          external: false
          icon_name: back
          icon_position: left
      image:
        url: /media/img/firefox/flare/placeholder.png
        alt: PlaceholderImage

