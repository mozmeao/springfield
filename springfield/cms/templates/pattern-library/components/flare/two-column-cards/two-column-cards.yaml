name: Two Column Cards
context:
  variants:
    - title: "Theme: light-dark (default)"
      testid: "two-column-cards-light-dark"
      theme: "light-dark"
      cards:
        - tag: "Free"
          superheading_text: "MONTHLY"
          heading_text: "Basic Plan"
          subheading_text: "Get started for free"
          items_list:
            - icon: shield
              text: "Basic tracker blocking"
            - icon: bookmark
              text: "Sync bookmarks across devices"
        - tag: "Plus"
          superheading_text: "MONTHLY"
          heading_text: "Premium Plan"
          subheading_text: "Everything in Free, plus more"
          items_list:
            - icon: shield
              text: "Advanced tracker blocking"
            - icon: bookmark
              text: "Sync across unlimited devices"
            - icon: heart
              text: "Priority customer support"

    - title: "Theme: light-light"
      testid: "two-column-cards-light-light"
      theme: "light-light"
      cards:
        - tag: "Free"
          superheading_text: "MONTHLY"
          heading_text: "Basic Plan"
          subheading_text: "Get started for free"
          items_list:
            - icon: shield
              text: "Basic tracker blocking"
            - icon: bookmark
              text: "Sync bookmarks across devices"
        - tag: "Plus"
          superheading_text: "MONTHLY"
          heading_text: "Premium Plan"
          subheading_text: "Everything in Free, plus more"
          items_list:
            - icon: shield
              text: "Advanced tracker blocking"
            - icon: bookmark
              text: "Sync across unlimited devices"
            - icon: heart
              text: "Priority customer support"

    - title: "Reduced card padding"
      theme: "light-dark"
      reduce_card_padding: true
      cards:
        - tag: "Free"
          superheading_text: "MONTHLY"
          heading_text: "Basic Plan"
          subheading_text: "Get started for free"
          items_list:
            - icon: shield
              text: "Basic tracker blocking"
            - icon: bookmark
              text: "Sync bookmarks across devices"
        - tag: "Plus"
          superheading_text: "MONTHLY"
          heading_text: "Premium Plan"
          subheading_text: "Everything in Free, plus more"
          items_list:
            - icon: shield
              text: "Advanced tracker blocking"
            - icon: bookmark
              text: "Sync across unlimited devices"
            - icon: heart
              text: "Priority customer support"

    - title: "With numbered list and timeline"
      theme: "light-dark"
      cards:
        - heading_text: "$4.99/month"
          superheading_text: "MONTHLY"
          subheading_text: "Billed monthly"
          numbered_list:
            - heading: "Download Firefox"
              text: "Get the browser that puts privacy first."
            - heading: "Sign in"
              text: "Create a free account to sync everywhere."
            - heading: "Stay protected"
              text: "Enhanced tracking protection enabled."
        - heading_text: "$9.99/month"
          subheading_text: "Billed monthly"
          timeline:
            - superheading: "Step 1"
              heading: "Create your account"
              subheading: "Sign up with your email address."
            - superheading: "Step 2"
              heading: "Choose a plan"
              subheading: "Select the plan that fits your needs."
            - superheading: "Step 3"
              heading: "Start browsing"
              subheading: "Enjoy private, secure browsing."

    - title: "With images (image_position: bottom-right / bottom-left)"
      testid: "two-column-cards-image-bottom"
      theme: "light-dark"
      reduce_card_padding: true
      cards:
        - tag: "Free"
          image_position: "bottom-right"
          superheading_text: "MONTHLY"
          heading_text: "Basic Plan"
          subheading_text: "Get started for free"
          items_list:
            - icon: checkmark
              text: "Basic tracker blocking"
            - icon: bookmark
              text: "Sync bookmarks across devices"
          image:
            url: /media/img/firefox/flare/placeholder.png
            alt: ""
        - tag: "Plus"
          image_position: "bottom-left"
          superheading_text: "MONTHLY"
          heading_text: "Premium Plan"
          subheading_text: "Everything in Free, plus more"
          items_list:
            - icon: shield
              text: "Advanced tracker blocking"
            - icon: lock
              text: "VPN protection"
          image:
            url: /media/img/firefox/flare/placeholder.png
            alt: ""

    - title: "With images (image_position: full-top)"
      testid: "two-column-cards-image-full-top"
      theme: "light-dark"
      cards:
        - tag: "Free"
          image_position: "full-top"
          superheading_text: "MONTHLY"
          heading_text: "Basic Plan"
          subheading_text: "Get started for free"
          items_list:
            - icon: checkmark
              text: "Basic tracker blocking"
            - icon: bookmark
              text: "Sync bookmarks across devices"
          image:
            url: /media/img/firefox/flare/placeholder.png
            alt: ""
        - tag: "Plus"
          image_position: "full-top"
          superheading_text: "MONTHLY"
          heading_text: "Premium Plan"
          subheading_text: "Everything in Free, plus more"
          items_list:
            - icon: shield
              text: "Advanced tracker blocking"
            - icon: lock
              text: "VPN protection"
          image:
            url: /media/img/firefox/flare/placeholder.png
            alt: ""
